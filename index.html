<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Language Translator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<h1 class="title">🌐 AI Language Translator</h1>

<div class="boxes">

<textarea id="inputText" placeholder="Enter text here..."></textarea>

<textarea id="outputText" placeholder="Translated text..." readonly></textarea>

</div>

<div class="lang-row">

<select id="sourceLang">
<option value="auto">Auto Detect</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
</select>

<button class="swap" onclick="swapLang()">⇄</button>

<select id="targetLang">
<option value="hi">Hindi</option>
<option value="en">English</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
</select>

</div>

<button class="translate-btn" onclick="translateText()">
✨ Translate Now
</button>

<div class="actions">
<button onclick="startVoice()">🎤 Voice Input</button>
<button onclick="speakText()">🔊 Speak</button>
<button onclick="copyText()">📋 Copy</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
